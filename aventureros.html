<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dir. Aventureros - Club de Conquistadores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🏕️ Club de Conquistadores</h1>
            </div>
            <button class="nav-toggle" onclick="toggleMenu()">☰</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="staff.html">Staff</a></li>
                <li><a href="aventureros.html" class="active">Dir. Aventureros</a></li>
                <li><a href="conquistadores.html">Dir. Conquistadores</a></li>
                <li><a href="guias.html">Dir. Guías</a></li>
                <li><a href="historia.html">Historia Den.</a></li>
                <li><a href="recursos.html">Recursos</a></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="#" id="logoutLink" style="display:none;" onclick="logout()">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1>Directiva Aventureros</h1>
            <button class="btn btn-primary admin-only" onclick="openAventurerosModal()">
                + Nuevo Registro
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="container">
        <div id="aventureros-container" class="cards-grid">
            <div class="loading">Cargando</div>
        </div>
    </div>

    <!-- Aventureros Modal -->
    <div id="aventurerosModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Registro</h2>
                <button class="modal-close" onclick="closeModal('aventurerosModal')">×</button>
            </div>
            
            <form id="aventurerosForm">
                <input type="hidden" id="aventurerosId">
                
                <div class="form-group">
                    <label for="aventurerosNombre">Nombre *</label>
                    <input type="text" id="aventurerosNombre" required>
                </div>
                
                <div class="form-group">
                    <label for="aventurerosFoto">Foto</label>
                    <input type="file" id="aventurerosFoto" accept="image/*" onchange="previewImage(this, 'aventurerosPreview')">
                    <div id="aventurerosPreview" style="margin-top: 1rem;"></div>
                </div>
                
                <div class="form-group">
                    <label for="aventurerosCargo">Cargo *</label>
                    <input type="text" id="aventurerosCargo" required>
                </div>
                
                <div class="form-group">
                    <label for="aventurerosTelefono">Teléfono</label>
                    <input type="tel" id="aventurerosTelefono">
                </div>
                
                <div class="form-group">
                    <label for="aventurerosClubDirige">Club que Dirige</label>
                    <input type="text" id="aventurerosClubDirige" placeholder="Ej: Club Central">
                </div>
                
                <div class="form-group">
                    <label for="aventurerosNombreClub">Nombre del Club</label>
                    <input type="text" id="aventurerosNombreClub" placeholder="Ej: Conquistadores Central">
                </div>
                
                <div class="form-group">
                    <label for="aventurerosLogoClub">Logo del Club</label>
                    <input type="file" id="aventurerosLogoClub" accept="image/*" onchange="previewImage(this, 'aventurerosLogoPreview')">
                    <div id="aventurerosLogoPreview" style="margin-top: 1rem;"></div>
                </div>
                
                <div id="aventurerosAlert"></div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('aventurerosModal')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 Club de Conquistadores. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/directores.js"></script>
    <script>
        // Configure for aventureros
        const TABLE_NAME = 'aventureros';
        const CONTAINER_ID = 'aventureros-container';
        const MODAL_ID = 'aventurerosModal';
        const FORM_ID = 'aventurerosForm';
        const ALERT_ID = 'aventurerosAlert';
    </script>
</body>
</html>
