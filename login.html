<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Club de Conquistadores</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-container {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            padding: 2rem;
        }
        .login-form {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-form h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }
        .login-form p {
            text-align: center;
            color: #6b7280;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🏕️ Club de Conquistadores</h1>
            </div>
            <button class="nav-toggle" onclick="toggleMenu()">☰</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="staff.html">Staff</a></li>
                <li><a href="aventureros.html">Dir. Aventureros</a></li>
                <li><a href="conquistadores.html">Dir. Conquistadores</a></li>
                <li><a href="guias.html">Dir. Guías</a></li>
                <li><a href="historia.html">Historia Den.</a></li>
                <li><a href="recursos.html">Recursos</a></li>
                <li><a href="login.html" class="active">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="login-container">
        <div class="login-form">
            <h2>Iniciar Sesión</h2>
            <p>Acceso de Administrador</p>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ministrylion@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Iniciar Sesión
                </button>
            </form>
            
            <p style="margin-top: 2rem; font-size: 0.875rem; text-align: center;">
                <a href="index.html" style="color: #1e40af;">← Volver al inicio</a>
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alertContainer');
            
            // Clear previous alerts
            alertContainer.innerHTML = '';
            
            // Show loading
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Iniciando sesión...';
            
            const result = await login(email, password);
            
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                showAlert(alertContainer, result.error || 'Credenciales inválidas', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar Sesión';
            }
        });
    </script>
</body>
</html>
