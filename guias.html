<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dir. Guías - Club de Conquistadores</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🏕️ ZONA 2, ADN</h1>
            </div>
            <button class="nav-toggle" onclick="toggleMenu()">☰</button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="staff.html">Staff</a></li>
                <li><a href="aventureros.html">Dir. Aventureros</a></li>
                <li><a href="conquistadores.html">Dir. Conquistadores</a></li>
                <li><a href="guias.html" class="active">Dir. Guías</a></li>
                <li><a href="historia.html">Historia Den.</a></li>
                <li><a href="recursos.html">Recursos</a></li>
                <li><a href="login.html" id="loginLink">Login</a></li>
                <li><a href="#" id="logoutLink" style="display:none;" onclick="logout()">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <img src="img/guias.png" alt="Guías Logo" style="max-width: 150px; height: auto; margin-bottom: 1rem;">
            <h1>Directiva Guías</h1>
            <button class="btn btn-primary admin-only" onclick="openGuiasModal()">
                + Nuevo Registro
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="container">
        <div id="guias-container" class="cards-grid">
            <div class="loading">Cargando</div>
        </div>
    </div>

    <!-- Guias Modal -->
    <div id="guiasModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Registro</h2>
                <button class="modal-close" onclick="closeModal('guiasModal')">×</button>
            </div>
            
            <form id="guiasForm">
                <input type="hidden" id="guiasId">
                
                <div class="form-group">
                    <label for="guiasNombre">Nombre *</label>
                    <input type="text" id="guiasNombre" required>
                </div>
                
                <div class="form-group">
                    <label for="guiasFoto">Foto</label>
                    <input type="file" id="guiasFoto" accept="image/*" onchange="previewImage(this, 'guiasPreview')">
                    <div id="guiasPreview" style="margin-top: 1rem;"></div>
                </div>
                
                <div class="form-group">
                    <label for="guiasCargo">Cargo *</label>
                    <input type="text" id="guiasCargo" required>
                </div>
                
                <div class="form-group">
                    <label for="guiasTelefono">Teléfono</label>
                    <input type="tel" id="guiasTelefono">
                </div>

                <div class="form-group">
                    <label for="guiasNombreClub">Nombre del Club</label>
                    <input type="text" id="guiasNombreClub" placeholder="Ej: Conquistadores Central">
                </div>
                
                <div class="form-group">
                    <label for="guiasLogoClub">Logo del Club</label>
                    <input type="file" id="guiasLogoClub" accept="image/*" onchange="previewImage(this, 'guiasLogoPreview')">
                    <div id="guiasLogoPreview" style="margin-top: 1rem;"></div>
                </div>
                
                <div id="guiasAlert"></div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('guiasModal')">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 Club de Conquistadores. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/supabase.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/directores.js"></script>
    <script>
        // Configure for guias
        const TABLE_NAME = 'guias';
        const CONTAINER_ID = 'guias-container';
        const MODAL_ID = 'guiasModal';
        const FORM_ID = 'guiasForm';
        const ALERT_ID = 'guiasAlert';
    </script>
</body>
</html>
